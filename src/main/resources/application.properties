micronaut.application.name=dogs-api
micronaut.server.port=8080

datasources.default.url=jdbc:h2:mem:dogs;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
datasources.default.driverClassName=org.h2.Driver
datasources.default.username=username
datasources.default.password=
datasources.default.schema-generate=NONE

jpa.default.properties.hibernate.hbm2ddl.auto=validate
jpa.default.properties.hibernate.show_sql=false
jpa.default.properties.hibernate.format_sql=true

flyway.datasources.default=default
flyway.datasources.default.enabled=true
flyway.datasources.default.locations=classpath:db/migration,classpath:db/seed